		<link rel="preload" href="/fonts/geist-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />

		<!-- Open Graph Meta Tags -->

			content="B.Sc. Informatik Student an der TU Berlin. Spezialisiert auf Web- und Softwareentwicklung."

		<!-- Twitter Card Meta Tags -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Jan Burzinski - Informatik Student & Entwickler" />
		<meta
			name="twitter:description"
			content="B.Sc. Informatik Student an der TU Berlin. Spezialisiert auf Web- und Softwareentwicklung."
		/>
		<meta name="twitter:image" content="https://janburzinski.de/janbewerbungsbild.jpg" />

		%sveltekit.head%

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Jan Burzinski",
				"jobTitle": "Informatik Student",
				"affiliation": {
					"@type": "Organization",
					"name": "Technische Universität Berlin"
				},
				"url": "https://janburzinski.de",
				"email": "j_burzinski@proton.me",
				"sameAs": ["https://github.com/janburzinski"],
				"alumniOf": {
					"@type": "Organization",
					"name": "Private Kant Schulen / Internationale Schule Berlin"
				},
				"knowsAbout": [
					"Java",
					"Python",
					"JavaScript",
					"TypeScript",
					"C",
					"Go",
					"Web Development",
					"Software Development",
					"Computer Science"
				],
				"description": "B.Sc. Informatik Student an der TU Berlin, spezialisiert auf Web- und Softwareentwicklung"
			}
		</script>

		<!-- Analytics by Datix -->
		<script defer data-site-id="4efd2441-206b-4e14-a4a1-1a91ee376a83" data-endpoint="https://cdn.usedatix.com/api/event" data-site-domain="janburzinski.de" src="https://cdn.usedatix.com/script.js"></script>
		<script defer data-site-id="4efd2441-206b-4e14-a4a1-1a91ee376a83" data-endpoint="https://cdn.usedatix.com/api/vitals" data-site-domain="janburzinski.de" src="https://cdn.usedatix.com/vitals.js"></script>
	</head>

	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var d = document.documentElement;
				var savedTheme = localStorage.getItem('theme');
				if (savedTheme === 'light') {
					d.classList.add('light');
				} else if (savedTheme === 'dark') {
					d.classList.add('dark');
				} else {
					if (window.matchMedia('(prefers-color-scheme: light)').matches) {
						d.classList.add('light');
					} else {
						d.classList.add('dark');
					}
				}
				// Enable theme transitions only after initial paint
				// so the first theme application doesn't flash
				requestAnimationFrame(function () {
					requestAnimationFrame(function () {
						d.classList.add('theme-ready');
					});
				});
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
